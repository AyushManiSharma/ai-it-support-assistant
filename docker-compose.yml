version: '3.8'

services:
  # The Backend Service
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    # This securely injects the hidden API keys into the container
    env_file:
      - ./backend/.env 

  # The Frontend Service
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    # This ensures the backend wakes up before the frontend tries to talk to it
    depends_on:
      - backend